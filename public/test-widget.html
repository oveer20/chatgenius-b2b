<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Prueba Stratix AI</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #050505; color: white; margin: 0; }
        .content { text-align: center; max-width: 600px; padding: 2rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
        h1 { color: #f5f5f7; }
        p { color: #86868b; line-height: 1.6; }
        a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="content">
        <h1>🚀 Prueba tu Agente</h1>
        <p>1. Crea un bot en <a href="https://stratix-ai.vercel.app" target="_blank">tu Dashboard de Stratix</a>.</p>
        <p>2. Copia el <strong>ID del Bot</strong>.</p>
        <p>3. Pégalo en el código de este archivo donde dice <code>data-bot-id</code>.</p>
        <p>Mira la esquina inferior derecha para ver tu IA en acción ↘️</p>
    </div>

    <!-- Instalación del Widget -->
    <script src="https://stratix-ai.vercel.app/widget.js" data-bot-id="533f12bf-c0f7-4da1-b16b-24c1cc777d0a"></script>
</body>
</html>
