  <!-- Stats row -->
  <rect x="170" y="430" width="3" height="100" rx="1.5" fill="url(#gold)"/>
  <text x="190" y="458" font-family="monospace" font-size="18" fill="#10B981">+1,847</text>
  <text x="190" y="478" font-family="system-ui" font-size="13" fill="#6B7280">empresas automatizadas</text>

  <text x="390" y="458" font-family="monospace" font-size="18" fill="#10B981">+2.4M</text>
  <text x="390" y="478" font-family="system-ui" font-size="13" fill="#6B7280">leads procesados</text>

  <text x="590" y="458" font-family="monospace" font-size="18" fill="#D4AF37">98.7%</text>
  <text x="590" y="478" font-family="system-ui" font-size="13" fill="#6B7280">satisfacción</text>

  <!-- Bottom bar -->
