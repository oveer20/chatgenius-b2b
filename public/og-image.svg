      <stop offset="0%" stop-color="#060B14"/>
      <stop offset="50%" stop-color="#0A1020"/>
      <stop offset="100%" stop-color="#070910"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#gold)"/>
  <rect x="1194" y="0" width="6" height="630" fill="url(#gold)"/>
  <circle cx="200" cy="500" r="300" fill="rgba(212,175,55,0.05)"/>
  <circle cx="900" cy="100" r="250" fill="rgba(139,92,246,0.04)"/>
  <circle cx="1050" cy="450" r="180" fill="rgba(212,175,55,0.04)"/>

  <!-- Shield icon -->
  <g transform="translate(75, 120)">
    <path d="M30 0 L60 10 L60 40 Q60 80 30 100 Q0 80 0 40 L0 10 Z" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.6"/>
    <path d="M30 15 L50 22 L50 42 Q50 70 30 85 Q10 70 10 42 L10 22 Z" fill="url(#gold)" opacity="0.15"/>
    <text x="30" y="58" font-family="serif" font-size="22" font-weight="700" fill="#D4AF37" text-anchor="middle">S</text>
  </g>

  <!-- Title -->
  <text x="170" y="200" font-family="Georgia, serif" font-size="68" font-weight="700" fill="#D4AF37">Stratix</text>
  <text x="170" y="278" font-family="Georgia, serif" font-size="68" font-weight="400" fill="#E8ECF5">Intelligence</text>

  <!-- Subtitle -->
